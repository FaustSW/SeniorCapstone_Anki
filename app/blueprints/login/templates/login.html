<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <!-- ================================================== -->
    <!-- MAIN PAGE -->
    <!-- ================================================== -->
    <div class="container">
        <h1>Select a Profile</h1>
        <p class="subtitle">Choose your account or create a new one</p>

        <!-- All profile cards show up here -->
        <div class="profiles-grid" id="profilesGrid"></div>


        <!-- Password and buttons section -->
        <div class="login-section">
            <h2 id="selectedProfileName">Select a profile to continue</h2>


        <!-- Password input -->
            <div id="passwordSection" style="display: none;">
                <div class="password-form">
                    <input type="password" id="passwordInput" placeholder="Enter password">
                    <button class="btn-login" onclick="handleLogin()">Sign In</button>
                </div>


        <!-- Yellow error box when password is wrong -->
                <div id="passwordError" class="password-error">
                    <strong> Password does not work!</strong>
                    <div class="password-hint">Please try again or select a different profile</div>
                </div>
            </div>


        <!-- Add profile button -->
            <div class="button-group">
                <button class="btn-add" onclick="openAddProfileModal()">+ Add Profile</button>
            </div>


        <!-- Success message shows here -->
            <div id="message" class="message"></div>
        </div>
    </div>


    <!-- =========================================================================================================== -->
    <!-- PROFILE CREATION POP UP -->
    <!-- =========================================================================================================== -->
    <div id="addProfileModal" class="modal">
        <div class="modal-content">
            <h2>Create New Profile</h2>
            <form id="createProfileForm">
                <div class="form-group">
                    <label for="newUsername">Display Name:</label>
                    <input type="text" id="newUsername" required placeholder="e.g., John Doe">
                </div>
                <div class="form-group">
                    <label for="newLoginUsername">Username:</label>
                    <input type="text" id="newLoginUsername" required placeholder="e.g., john_doe">
                </div>
                <div class="form-group">
                    <label for="newPassword">Password:</label>
                    <input type="password" id="newPassword" required placeholder="Create a password">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="closeAddProfileModal()">Cancel</button>
                    <button type="submit" class="btn-create">Create Profile</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================================================================================================================= -->
    <!-- JAVASCRIPT -->
    <!-- ============================================================================================================================================= -->
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>

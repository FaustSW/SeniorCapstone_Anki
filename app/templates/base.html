<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block extra_css %}{% endblock %}

    <!-- ============================================================================================================== -->
    <!-- THEME SELECTOR STYLES -->
    <!-- ============================================================================================================== -->
    <style>
        .theme-selector {
            position: fixed;
            top: 20px;
            right: 140px;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--bg-card);
            padding: 8px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .theme-selector label {
            font-weight: bold;
            white-space: nowrap;
            color: var(--text-main);
        }

        .theme-selector select {
            padding: 8px 12px;
            border-radius: 5px;
            border: 2px solid var(--primary);
            cursor: pointer;
            font-size: 14px;
            background-color: var(--bg-card);
            color: var(--text-main);
        }

        .theme-selector select:hover {
            background-color: var(--primary);
            color: white;
        }
    </style>
</head>
<body>

    <!-- ============================================================================================================== -->
    <!-- THEME SELECTOR DROPDOWN -->
    <!-- ============================================================================================================== -->
    <div class="theme-selector">
        <label for="theme-dropdown">Theme:</label>
        <select id="theme-dropdown" onchange="changeTheme()">
            <option value="">Loading...</option>
        </select>
    </div>

    <!-- ================================================== -->
    <!-- Controls acting as a header (theme toggle / settings) -->
    <!-- ================================================== -->
    <div class="controls">
        <button class="header-btn" title="Settings">⚙</button>
    </div>

    <!-- ================================================== -->
    <!-- Page-specific content -->
    <!-- ================================================== -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Global JS for theme switching -->
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/header.js') }}"></script>
    {% block extra_js %}{% endblock %}

</body>
</html>

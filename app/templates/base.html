<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Anki Clone{% endblock %}</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <style>
        .theme-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--bg-card);
            padding: 8px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .theme-selector label {
            font-weight: bold;
            white-space: nowrap;
            color: var(--text-main);
            font-size: 12px;
        }

        .theme-selector select {
            padding: 6px 8px;
            border-radius: 4px;
            border: 2px solid var(--primary);
            cursor: pointer;
            font-size: 12px;
            background-color: var(--bg-card);
            color: var(--text-main);
        }

        .theme-selector select:hover {
            background-color: var(--primary);
            color: white;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>
    <!-- THEME SELECTOR (functional — powered by theme.js) -->
    <div class="theme-selector">
        <label for="theme-dropdown">🎨 Theme:</label>
        <select id="theme-dropdown" onchange="changeTheme()">
            <option value="">Loading...</option>
        </select>
    </div>

    <!-- PAGE CONTENT — every child template fills this -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Global JS -->
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>

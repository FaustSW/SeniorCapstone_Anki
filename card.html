<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Interface</title>
    <link rel="stylesheet" href="card.css">
</head>

<body data-theme="light">

    <div class="stats">
        <div>Current Streak: <span id="current-streak">0</span></div>
        <div>Max Streak: <span id="max-streak">0</span></div>
    </div>

    <div class="controls">
        <button class="icon-btn" id="theme-toggle" title="Toggle Dark/Light Mode">🌓</button>
        <button class="icon-btn" title="Settings">⚙️</button>
    </div>

    <div class="wrapper">
    <div class="card" id="main-card">
        <div class="card-inner" id="card-inner">
            
            <div class="card-face card-front">
                <div class="content-area">
                    <div class="large-text">
                        {{ main_text_placeholder }}
                    </div>
                </div>
                <div class="button-row">
                    <div class="btn-label">Press Space or Click Sides to Flip</div>
                </div>
            </div>

            <div class="card-face card-back">
                <div class="content-area">
                    <div class="large-text">
                        {{ back_text_placeholder }}
                    </div>
                </div>
                <div class="button-row">
                    <div class="btn-wrapper">
                        <span class="btn-label">< 1m</span>
                        <button class="card-btn">Again</button>
                    </div>
                    <div class="btn-wrapper">
                        <span class="btn-label">< 6m</span>
                        <button class="card-btn">Hard</button>
                    </div>
                    <div class="btn-wrapper">
                        <span class="btn-label">< 10m</span>
                        <button class="card-btn">Good</button>
                    </div>
                    <div class="btn-wrapper">
                        <span class="btn-label">5d</span>
                        <button class="card-btn">Easy</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
    </div>

    <div class="chart-container">
        <div class="bar" id="bar-0"></div>
        <div class="bar" id="bar-1"></div>
        <div class="bar" id="bar-2"></div>
        <div class="bar" id="bar-3"></div>
    </div>

    <script src="card.js"></script>
</body>
</html>
